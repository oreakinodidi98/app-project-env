apiVersion: v1
kind: Namespace
metadata:
  name: sample-3-demo
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: sample-3-app-config
  namespace: sample-3-demo
data:
  environment: demo
  owner: platform-team
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: sample-3-web
  namespace: sample-3-demo
spec:
  replicas: 1
  selector:
    matchLabels:
      app: sample-3-web
  template:
    metadata:
      labels:
        app: sample-3-web
    spec:
      containers:
      - name: web
        image: nginx:not-a-real-tag
        ports:
        - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: sample-3-web
  namespace: sample-3-demo
spec:
  selector:
    app: sample-3-web
  ports:
  - port: 80
    targetPort: 80
